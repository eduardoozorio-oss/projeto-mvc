<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao Sistema MVC</title>
    <style>
        /* Configurações Globais e Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Card Central */
        .container {
            text-align: center;
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #dc3545; /* Detalhe em vermelho no topo */
            margin: 20px;
        }

        /* Tipografia */
        h1 {
            color: #dc3545; /* Vermelho principal */
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Grupo de Botões/Links */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Estilização dos Links como Botões */
        .btn {
            display: block;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #dc3545;
            color: #ffffff;
            border: 2px solid #dc3545;
        }

        .btn-primary:hover {
            background-color: #bd2130;
            border-color: #bd2130;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.2);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #dc3545;
            border: 2px solid #dc3545;
        }

        .btn-secondary:hover {
            background-color: #fff5f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema MVC</h1>
        <p>Faça login para acessar o sistema</p>

        <div class="actions">
            <a href="/auth/login" class="btn btn-primary">Entrar</a>
            <a href="/auth/cadastro" class="btn btn-secondary">Criar conta</a>
        </div>
    </div>

</body>
</html>
