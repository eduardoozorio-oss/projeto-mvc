<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema MVC</title>
    <style>
        /* Configurações Globais e Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Card Central */
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #dc3545; /* Detalhe em vermelho no topo */
            margin: 20px;
        }

        /* Título */
        h1 {
            color: #dc3545;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            font-weight: 700;
            text-align: center;
        }

        /* Formulário e Inputs */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
        }

        .input-group input {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1.5px solid #dee2e6;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Efeito ao focar no campo */
        .input-group input:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);
        }

        /* Caixa de Erro Dinâmica */
        .error-message {
            background-color: #fff5f5;
            color: #dc3545;
            border-left: 4px solid #dc3545;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* Botão Enviar */
        button[type="submit"] {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #dc3545;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        button[type="submit"]:hover {
            background-color: #bd2130;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.2);
        }

        /* Link de Cadastro no Rodapé */
        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #666;
        }

        .footer-text a {
            color: #dc3545;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer-text a:hover {
            color: #bd2130;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Entrar no sistema</h1>

        <form action="/auth/login" method="post">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Sua senha">
            </div>

            {% if erro %}
                <div class="error-message">
                    {{ erro }}
                </div>
            {% endif %}

            <button type="submit">Entrar</button>
        </form>

        <p class="footer-text">Não tem conta? <a href="/auth/cadastro">Cadastre-se</a></p>
    </div>

</body>
</html>
